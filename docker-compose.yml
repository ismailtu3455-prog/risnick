version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gatebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gatebox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gatebox}
      POSTGRES_DB: ${POSTGRES_DB:-gatebox}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gatebox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gatebox-app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: gatebox-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
